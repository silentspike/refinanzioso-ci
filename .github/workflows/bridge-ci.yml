name: Public CI Bridge

on:
  repository_dispatch:
    types: [refinanzioso-ci]
  workflow_dispatch:
    inputs:
      source_repo:
        description: Private source repository in owner/name form.
        required: true
        type: string
      sha:
        description: Exact source commit SHA.
        required: true
        type: string
      ref:
        description: Source ref for traceability.
        required: true
        type: string
      pr:
        description: Private pull request number, or empty for a branch push.
        required: false
        type: string
      mode:
        description: Fast pull-request checks or the complete post-merge suite.
        required: true
        default: full
        type: choice
        options:
          - fast
          - full

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.event.client_payload.sha || inputs.sha }}-${{ github.event.client_payload.mode || inputs.mode || 'full' }}
  cancel-in-progress: true

jobs:
  bridge:
    name: public-ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Validate request
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == 'repository_dispatch' ]]; then
            repo="$(jq -r '.client_payload.source_repo // empty' "$GITHUB_EVENT_PATH")"
            sha="$(jq -r '.client_payload.sha // empty' "$GITHUB_EVENT_PATH")"
            ref="$(jq -r '.client_payload.ref // empty' "$GITHUB_EVENT_PATH")"
            pr="$(jq -r '.client_payload.pr // empty' "$GITHUB_EVENT_PATH")"
            mode="$(jq -r '.client_payload.mode // "full"' "$GITHUB_EVENT_PATH")"
          else
            repo="$(jq -r '.inputs.source_repo // empty' "$GITHUB_EVENT_PATH")"
            sha="$(jq -r '.inputs.sha // empty' "$GITHUB_EVENT_PATH")"
            ref="$(jq -r '.inputs.ref // empty' "$GITHUB_EVENT_PATH")"
            pr="$(jq -r '.inputs.pr // empty' "$GITHUB_EVENT_PATH")"
            mode="$(jq -r '.inputs.mode // "full"' "$GITHUB_EVENT_PATH")"
          fi
          [[ "$repo" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          [[ -n "$ref" ]]
          [[ "$pr" =~ ^[0-9]*$ ]]
          [[ "$mode" =~ ^(fast|full)$ ]]
          jq -n \
            --arg repo "$repo" \
            --arg sha "$sha" \
            --arg ref "$ref" \
            --arg pr "$pr" \
            --arg mode "$mode" \
            '{repo: $repo, sha: $sha, ref: $ref, pr: $pr, mode: $mode}' \
            > "$RUNNER_TEMP/bridge-meta.json"
          chmod 600 "$RUNNER_TEMP/bridge-meta.json"
      - name: Mark private status pending
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$CI_TOKEN" ]]
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          mode="$(jq -r '.mode' "$RUNNER_TEMP/bridge-meta.json")"
          GH_TOKEN="$CI_TOKEN" gh api --silent --method POST "repos/${repo}/statuses/${sha}" \
            -f state=pending \
            -f context="public-ci/${mode}" \
            -f description="Public CI ${mode} checks started" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$mode" == 'full' ]]; then
            GH_TOKEN="$CI_TOKEN" gh api --silent --method POST "repos/${repo}/statuses/${sha}" \
              -f state=pending \
              -f context='public-ci/build' \
              -f description='Public CI full checks started' \
              -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
      - name: Fetch private source quietly
        id: fetch
        continue-on-error: true
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          mkdir -p "$GITHUB_WORKSPACE/private-source"
          : > "$RUNNER_TEMP/private-ci-details.log"
          curl --silent --show-error --fail --location --retry 2 \
            -H "Authorization: Bearer ${CI_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${repo}/tarball/${sha}" \
            -o "$RUNNER_TEMP/private-source.tar.gz" \
            2>> "$RUNNER_TEMP/private-ci-details.log"
          tar -xzf "$RUNNER_TEMP/private-source.tar.gz" \
            --strip-components=1 \
            -C "$GITHUB_WORKSPACE/private-source" \
            2>> "$RUNNER_TEMP/private-ci-details.log"
      - name: Run requested private checks
        id: checks
        if: steps.fetch.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const childProcess = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const root = path.join(process.env.GITHUB_WORKSPACE, 'private-source');
            const logPath = path.join(process.env.RUNNER_TEMP, 'private-ci-details.log');
            const meta = JSON.parse(fs.readFileSync(
              path.join(process.env.RUNNER_TEMP, 'bridge-meta.json'),
              'utf8',
            ));
            const details = [];
            let failed = false;
            const decode = value => Buffer.from(value, 'hex').toString('utf8');
            const policyName = decode('2e67697469676e6f7265');
            const directoryGuard = decode('646f63732f');
            const documentGuard = decode('2a2e6d64');
            const documentSuffix = decode('2e6d64');
            const smokePath = decode('736372697074732f63695f736d6f6b652e7079');

            const appendResult = result => {
              if (result.stdout) details.push(result.stdout.toString());
              if (result.stderr) details.push(result.stderr.toString());
              if (result.status !== 0) failed = true;
            };
            const runQuietly = (command, args) => appendResult(childProcess.spawnSync(
              command,
              args,
              {
                cwd: root,
                encoding: 'utf8',
                env: {...process.env, PYTHONDONTWRITEBYTECODE: '1'},
              },
            ));
            const walk = directory => fs.readdirSync(directory, {withFileTypes: true}).flatMap(entry => {
              const absolute = path.join(directory, entry.name);
              return entry.isDirectory() ? walk(absolute) : [absolute];
            });

            const policyPath = path.join(root, policyName);
            if (!fs.existsSync(policyPath)) {
              details.push('Required repository policy file is missing.');
              failed = true;
            } else {
              const policy = fs.readFileSync(policyPath, 'utf8').split(/\r?\n/);
              if (!policy.includes(directoryGuard)) {
                details.push('The internal-document directory guard is missing.');
                failed = true;
              }
              if (!policy.includes(documentGuard)) {
                details.push('The Markdown guard is missing.');
                failed = true;
              }
            }

            const files = walk(root);
            const blocked = files.find(file => {
              const relative = path.relative(root, file).split(path.sep).join('/');
              return relative.startsWith(directoryGuard) || relative.endsWith(documentSuffix);
            });
            if (blocked) {
              details.push(`Code-only policy violation: ${path.relative(root, blocked)}`);
              failed = true;
            }

            const yamlFiles = files
              .filter(file => file.endsWith('.yml'))
              .map(file => path.relative(root, file));
            runQuietly('ruby', [
              '-e',
              'require "yaml"; ARGV.each { |f| YAML.load_file(f, aliases: true) }',
              ...yamlFiles,
            ]);
            for (const file of files.filter(file => file.endsWith('.sh'))) {
              runQuietly('bash', ['-n', path.relative(root, file)]);
            }
            for (const file of files.filter(file => file.endsWith('.py'))) {
              runQuietly('python3', ['-m', 'py_compile', path.relative(root, file)]);
            }
            const smoke = path.join(root, ...smokePath.split('/'));
            if (meta.mode === 'full' && fs.existsSync(smoke)) {
              runQuietly('python3', [path.relative(root, smoke)]);
            }

            fs.writeFileSync(logPath, details.join('\n'), {mode: 0o600});
            if (failed) {
              core.setFailed('Private checks failed. Details were retained privately.');
            }
      - name: Post sanitized private failure details
        if: steps.fetch.outcome == 'failure' || steps.checks.outcome == 'failure'
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          pr="$(jq -r '.pr' "$RUNNER_TEMP/bridge-meta.json")"
          mode="$(jq -r '.mode' "$RUNNER_TEMP/bridge-meta.json")"
          if [[ -z "$pr" ]]; then
            exit 0
          fi
          details="$RUNNER_TEMP/private-ci-details.log"
          sanitized="$RUNNER_TEMP/private-ci-sanitized.log"
          tail -n 120 "$details" 2>/dev/null \
            | sed -E \
                -e 's#https?://[^[:space:]]+#https://[redacted]#g' \
                -e 's#/(home|tmp|work)/[^[:space:]]+#[redacted-path]#g' \
                -e 's#([0-9]{1,3}\.){3}[0-9]{1,3}#[redacted-ip]#g' \
                -e 's#[A-Za-z0-9_./+=-]{64,}#[redacted-value]#g' \
            > "$sanitized"
          if [[ ! -s "$sanitized" ]]; then
            echo 'Bridge infrastructure step failed without diagnostic output.' > "$sanitized"
          fi
          {
            echo "Public CI ${mode} checks failed for \`${sha}\`."
            echo
            echo 'Detailed output is available only in this private pull request:'
            echo
            echo '```text'
            head -c 12000 "$sanitized"
            echo
            echo '```'
          } > "$RUNNER_TEMP/private-ci-comment.md"
          jq -n --rawfile body "$RUNNER_TEMP/private-ci-comment.md" '{body: $body}' \
            | GH_TOKEN="$CI_TOKEN" gh api --silent --method POST \
                "repos/${repo}/issues/${pr}/comments" --input -
      - name: Report final private status
        if: always() && steps.payload.outcome == 'success'
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          mode="$(jq -r '.mode' "$RUNNER_TEMP/bridge-meta.json")"
          if [[ "${{ steps.fetch.outcome }}" != 'success' ]]; then
            state=error
            description="Public CI ${mode} infrastructure failed"
          elif [[ "${{ steps.checks.outcome }}" != 'success' ]]; then
            state=failure
            description="Public CI ${mode} failed; private PR has details"
          else
            state=success
            description="Public CI ${mode} checks passed"
          fi
          GH_TOKEN="$CI_TOKEN" gh api --silent --method POST "repos/${repo}/statuses/${sha}" \
            -f state="$state" \
            -f context="public-ci/${mode}" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$mode" == 'full' ]]; then
            GH_TOKEN="$CI_TOKEN" gh api --silent --method POST "repos/${repo}/statuses/${sha}" \
              -f state="$state" \
              -f context='public-ci/build' \
              -f description="$description" \
              -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
      - name: Enforce bridge result
        if: steps.fetch.outcome != 'success' || steps.checks.outcome != 'success'
        shell: bash
        run: |
          echo 'Public CI bridge failed. Details were sent to the private repository when a pull request was supplied.'
          exit 1
      - name: Clean up private source
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(realpath -m -- "$GITHUB_WORKSPACE")"
          source_root="${workspace}/private-source"
          [[ -n "$workspace" && "$workspace" != '/' ]]
          [[ "$source_root" == "${workspace}/private-source" ]]
          rm -rf -- "$source_root"
