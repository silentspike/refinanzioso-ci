name: Public CI Bridge

on:
  repository_dispatch:
    types: [refinanzioso-ci]
  workflow_dispatch:
    inputs:
      source_repo:
        description: Private source repository in owner/name form.
        required: true
        type: string
      sha:
        description: Exact source commit SHA.
        required: true
        type: string
      ref:
        description: Source ref for traceability.
        required: true
        type: string
      pr:
        description: Private pull request number, or empty for a branch push.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.event.client_payload.sha || inputs.sha }}
  cancel-in-progress: true

jobs:
  bridge:
    name: public-ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Validate request
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == 'repository_dispatch' ]]; then
            repo="$(jq -r '.client_payload.source_repo // empty' "$GITHUB_EVENT_PATH")"
            sha="$(jq -r '.client_payload.sha // empty' "$GITHUB_EVENT_PATH")"
            ref="$(jq -r '.client_payload.ref // empty' "$GITHUB_EVENT_PATH")"
            pr="$(jq -r '.client_payload.pr // empty' "$GITHUB_EVENT_PATH")"
          else
            repo="$(jq -r '.inputs.source_repo // empty' "$GITHUB_EVENT_PATH")"
            sha="$(jq -r '.inputs.sha // empty' "$GITHUB_EVENT_PATH")"
            ref="$(jq -r '.inputs.ref // empty' "$GITHUB_EVENT_PATH")"
            pr="$(jq -r '.inputs.pr // empty' "$GITHUB_EVENT_PATH")"
          fi
          [[ "$repo" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          [[ -n "$ref" ]]
          [[ "$pr" =~ ^[0-9]*$ ]]
          jq -n \
            --arg repo "$repo" \
            --arg sha "$sha" \
            --arg ref "$ref" \
            --arg pr "$pr" \
            '{repo: $repo, sha: $sha, ref: $ref, pr: $pr}' \
            > "$RUNNER_TEMP/bridge-meta.json"
          chmod 600 "$RUNNER_TEMP/bridge-meta.json"
      - name: Mark private status pending
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$CI_TOKEN" ]]
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          GH_TOKEN="$CI_TOKEN" gh api --silent --method POST "repos/${repo}/statuses/${sha}" \
            -f state=pending \
            -f context='public-ci/build' \
            -f description='Public CI bridge started' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Fetch private source quietly
        id: fetch
        continue-on-error: true
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          mkdir -p "$RUNNER_TEMP/private-source"
          : > "$RUNNER_TEMP/private-ci-details.log"
          curl --silent --show-error --fail --location --retry 2 \
            -H "Authorization: Bearer ${CI_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${repo}/tarball/${sha}" \
            -o "$RUNNER_TEMP/private-source.tar.gz" \
            2>> "$RUNNER_TEMP/private-ci-details.log"
          tar -xzf "$RUNNER_TEMP/private-source.tar.gz" \
            --strip-components=1 \
            -C "$RUNNER_TEMP/private-source" \
            2>> "$RUNNER_TEMP/private-ci-details.log"
      - name: Run quiet structure and lint checks
        id: checks
        if: steps.fetch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/private-source"
          log="$RUNNER_TEMP/private-ci-details.log"
          failed=0

          if [[ ! -f .gitignore ]]; then
            echo 'Required repository policy file is missing.' >> "$log"
            failed=1
          else
            if ! grep -Fxq 'docs/' .gitignore; then
              echo 'The internal-document directory guard is missing.' >> "$log"
              failed=1
            fi
            if ! grep -Fxq '*.md' .gitignore; then
              echo 'The Markdown guard is missing.' >> "$log"
              failed=1
            fi
          fi

          blocked="$(find . -type f \( -path './docs/*' -o -name '*.md' \) -print -quit)"
          if [[ -n "$blocked" ]]; then
            echo "Code-only policy violation: ${blocked}" >> "$log"
            failed=1
          fi

          if ! ruby -e 'require "yaml"; Dir[".github/**/*.yml"].each { |f| YAML.load_file(f, aliases: true) }' \
            >> "$log" 2>&1; then
            echo 'Workflow or issue-form YAML validation failed.' >> "$log"
            failed=1
          fi

          while IFS= read -r -d '' script; do
            if ! bash -n "$script" >> "$log" 2>&1; then
              failed=1
            fi
          done < <(find . -type f -name '*.sh' -print0)

          while IFS= read -r -d '' module; do
            if ! PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile "$module" >> "$log" 2>&1; then
              failed=1
            fi
          done < <(find . -type f -name '*.py' -print0)

          if [[ -f scripts/ci_smoke.py ]]; then
            if ! PYTHONDONTWRITEBYTECODE=1 python3 scripts/ci_smoke.py >> "$log" 2>&1; then
              failed=1
            fi
          fi

          if [[ "$failed" != '0' ]]; then
            exit 1
          fi
      - name: Post sanitized private failure details
        if: steps.fetch.outcome == 'failure' || steps.checks.outcome == 'failure'
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          pr="$(jq -r '.pr' "$RUNNER_TEMP/bridge-meta.json")"
          if [[ -z "$pr" ]]; then
            exit 0
          fi
          details="$RUNNER_TEMP/private-ci-details.log"
          sanitized="$RUNNER_TEMP/private-ci-sanitized.log"
          tail -n 120 "$details" 2>/dev/null \
            | sed -E \
                -e 's#https?://[^[:space:]]+#https://[redacted]#g' \
                -e 's#/(home|tmp|work)/[^[:space:]]+#[redacted-path]#g' \
                -e 's#([0-9]{1,3}\.){3}[0-9]{1,3}#[redacted-ip]#g' \
                -e 's#[A-Za-z0-9_./+=-]{64,}#[redacted-value]#g' \
            > "$sanitized"
          if [[ ! -s "$sanitized" ]]; then
            echo 'Bridge infrastructure step failed without diagnostic output.' > "$sanitized"
          fi
          {
            echo "Public CI bridge failed for \`${sha}\`."
            echo
            echo 'Detailed output is available only in this private pull request:'
            echo
            echo '```text'
            head -c 12000 "$sanitized"
            echo
            echo '```'
          } > "$RUNNER_TEMP/private-ci-comment.md"
          jq -n --rawfile body "$RUNNER_TEMP/private-ci-comment.md" '{body: $body}' \
            | GH_TOKEN="$CI_TOKEN" gh api --silent --method POST \
                "repos/${repo}/issues/${pr}/comments" --input -
      - name: Report final private status
        if: always() && steps.payload.outcome == 'success'
        env:
          CI_TOKEN: ${{ secrets.CI_PRIVATE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repo="$(jq -r '.repo' "$RUNNER_TEMP/bridge-meta.json")"
          sha="$(jq -r '.sha' "$RUNNER_TEMP/bridge-meta.json")"
          if [[ "${{ steps.fetch.outcome }}" != 'success' ]]; then
            state=error
            description='Public CI bridge infrastructure failed'
          elif [[ "${{ steps.checks.outcome }}" != 'success' ]]; then
            state=failure
            description='Public CI bridge failed; private PR has details'
          else
            state=success
            description='Public CI bridge passed'
          fi
          GH_TOKEN="$CI_TOKEN" gh api --silent --method POST "repos/${repo}/statuses/${sha}" \
            -f state="$state" \
            -f context='public-ci/build' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Enforce bridge result
        if: steps.fetch.outcome != 'success' || steps.checks.outcome != 'success'
        shell: bash
        run: |
          echo 'Public CI bridge failed. Details were sent to the private repository when a pull request was supplied.'
          exit 1
